app = "mesh-llm-api"
primary_region = "syd"

[build]
  dockerfile = "../Dockerfile"
  [build.args]
    CMD = "api"

[http_service]
  internal_port = 9337
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1


[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
