name: Warm GPU CI caches

# ─────────────────────────────────────────────────────────────────────────────
# Populates the cross-PR Linux GPU artifact caches on main and prunes old
# versions so the repo-level GitHub Actions cache stays under the free-tier
# storage budget.
#
# Why this workflow is separate from ci.yml:
#
#   - ci.yml PR jobs only RESTORE the slim caches via actions/cache/restore@v5.
#     PR runs never write cache entries and never pollute PR-scoped storage.
#   - warm-caches.yml runs on push to main (filtered to cache-key inputs) and
#     on manual workflow_dispatch. It is the single writer for the main-scoped
#     GPU caches consumed by PR CI.
#   - The slim jobs warm the exact artifacts consumed by the current PR smoke
#     lanes (`linux_cuda` arch89/fa-off and `linux_rocm` gfx1100).
#   - The fat jobs warm the full default arch matrices for CUDA and ROCm so the
#     heavier artifact shapes have stable main-scoped cache entries too.
#   - The repeated warm-job body lives in `gpu-warm-cache-job.yml`; this file
#     stays responsible for top-level triggers, SHA resolution, explicit key
#     composition, and cache pruning.
#
# Retention policy precedence:
#   1. workflow_dispatch input `retention` (one-off manual override)
#   2. repository variable `vars.LLAMA_GPU_CACHE_RETENTION` (persistent, set via
#      Settings → Secrets and variables → Actions → Variables)
#   3. hardcoded default of 2
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      # Every file listed here is also part of one or more cache keys. A change
      # to any of them invalidates the cache AND triggers this workflow to
      # rebuild and re-warm in the same commit.
      - 'scripts/build-linux.sh'
      - 'scripts/build-linux-rocm.sh'
      - 'Justfile'
      - '.github/workflows/ci.yml'
      - '.github/workflows/warm-caches.yml'
      - '.github/workflows/gpu-warm-cache-job.yml'
      - '.github/cache-version.txt'
  workflow_dispatch:
    inputs:
      retention:
        description: 'Number of warmed GPU cache versions to keep (overrides vars.LLAMA_GPU_CACHE_RETENTION; default 2)'
        required: false
        default: ''

concurrency:
  group: warm-caches-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

env:
  CACHE_NAMESPACE: mesh-llm
  LLAMA_GPU_CACHE_RETENTION: ${{ github.event.inputs.retention || vars.LLAMA_GPU_CACHE_RETENTION || '2' }}

jobs:
  resolve_llama_sha:
    name: Resolve llama.cpp upstream SHA
    runs-on: ubuntu-latest
    outputs:
      cache_namespace: ${{ steps.cache_namespace.outputs.value }}
      sha: ${{ steps.resolve.outputs.sha }}
      cuda_cache_inputs_hash: ${{ steps.cache_inputs.outputs.cuda_hash }}
      rocm_cache_inputs_hash: ${{ steps.cache_inputs.outputs.rocm_hash }}

    steps:
      - uses: actions/checkout@v5

      - name: Expose cache namespace
        id: cache_namespace
        shell: bash
        run: echo "value=${CACHE_NAMESPACE}" >> "$GITHUB_OUTPUT"

      - name: Resolve llama.cpp upstream SHA
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          SHA=$(git ls-remote https://github.com/michaelneale/llama.cpp.git refs/heads/upstream-latest | cut -f1)
          if [[ -z "$SHA" ]]; then
            echo "Failed to resolve llama.cpp upstream-latest SHA" >&2
            exit 1
          fi
          echo "Resolved llama.cpp upstream-latest SHA: $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Hash cache-key inputs
        id: cache_inputs
        shell: bash
        run: |
          set -euo pipefail

          cuda_hash=$(sha256sum \
            scripts/build-linux.sh \
            Justfile \
            .github/workflows/ci.yml \
            .github/workflows/warm-caches.yml \
            .github/workflows/gpu-warm-cache-job.yml \
            .github/cache-version.txt \
            | sha256sum | cut -d' ' -f1)

          rocm_hash=$(sha256sum \
            scripts/build-linux-rocm.sh \
            Justfile \
            .github/workflows/ci.yml \
            .github/workflows/warm-caches.yml \
            .github/workflows/gpu-warm-cache-job.yml \
            .github/cache-version.txt \
            | sha256sum | cut -d' ' -f1)

          echo "cuda_hash=$cuda_hash" >> "$GITHUB_OUTPUT"
          echo "rocm_hash=$rocm_hash" >> "$GITHUB_OUTPUT"

  warm_llama_cuda_slim:
    needs: resolve_llama_sha
    uses: ./.github/workflows/gpu-warm-cache-job.yml
    with:
      job_name: Warm Linux CUDA slim cache
      cache_label: CUDA slim
      container_image: nvidia/cuda:12.8.0-devel-ubuntu22.04
      llama_sha: ${{ needs.resolve_llama_sha.outputs.sha }}
      cache_key: ${{ format('{0}-llama-cuda-slim-{1}-{2}-arch89-fa-off-cuda12.8', needs.resolve_llama_sha.outputs.cache_namespace, needs.resolve_llama_sha.outputs.sha, needs.resolve_llama_sha.outputs.cuda_cache_inputs_hash) }}
      build_recipe: release-build-cuda
      build_args: 89
      extra_env: |
        MESH_LLM_CUDA_FA_ALL_QUANTS=off
        MESH_LLM_LLAMA_TARGETS=rpc-server llama-server llama-moe-analyze llama-moe-split

  warm_llama_cuda_fat:
    needs: resolve_llama_sha
    uses: ./.github/workflows/gpu-warm-cache-job.yml
    with:
      job_name: Warm Linux CUDA fat cache
      cache_label: CUDA fat
      container_image: nvidia/cuda:12.8.0-devel-ubuntu22.04
      llama_sha: ${{ needs.resolve_llama_sha.outputs.sha }}
      cache_key: ${{ format('{0}-llama-cuda-fat-{1}-{2}-arch75-80-86-89-90-120-fa-on-cuda12.8', needs.resolve_llama_sha.outputs.cache_namespace, needs.resolve_llama_sha.outputs.sha, needs.resolve_llama_sha.outputs.cuda_cache_inputs_hash) }}
      build_recipe: release-build-cuda

  warm_llama_rocm_slim:
    needs: resolve_llama_sha
    uses: ./.github/workflows/gpu-warm-cache-job.yml
    with:
      job_name: Warm Linux ROCm slim cache
      cache_label: ROCm slim
      container_image: rocm/dev-ubuntu-24.04:7.0-complete
      llama_sha: ${{ needs.resolve_llama_sha.outputs.sha }}
      cache_key: ${{ format('{0}-llama-rocm-slim-{1}-{2}-gfx1100-rocm7.0', needs.resolve_llama_sha.outputs.cache_namespace, needs.resolve_llama_sha.outputs.sha, needs.resolve_llama_sha.outputs.rocm_cache_inputs_hash) }}
      build_recipe: release-build-rocm
      build_args: gfx1100

  warm_llama_rocm_fat:
    needs: resolve_llama_sha
    uses: ./.github/workflows/gpu-warm-cache-job.yml
    with:
      job_name: Warm Linux ROCm fat cache
      cache_label: ROCm fat
      container_image: rocm/dev-ubuntu-24.04:7.0-complete
      llama_sha: ${{ needs.resolve_llama_sha.outputs.sha }}
      cache_key: ${{ format('{0}-llama-rocm-fat-{1}-{2}-gfx90a-gfx942-gfx1100-gfx1101-gfx1102-gfx1200-gfx1201-rocm7.0', needs.resolve_llama_sha.outputs.cache_namespace, needs.resolve_llama_sha.outputs.sha, needs.resolve_llama_sha.outputs.rocm_cache_inputs_hash) }}
      build_recipe: release-build-rocm

  prune_llama_gpu_caches:
    name: Prune old GPU caches
    needs:
      - warm_llama_cuda_slim
      - warm_llama_cuda_fat
      - warm_llama_rocm_slim
      - warm_llama_rocm_fat
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Prune old GPU caches
        uses: actions/github-script@v8
        env:
          CACHE_NAMESPACE: ${{ env.CACHE_NAMESPACE }}
          RETENTION: ${{ env.LLAMA_GPU_CACHE_RETENTION }}
          TARGET_REF: ${{ github.ref }}
        with:
          script: |
            const retention = parseInt(process.env.RETENTION, 10);
            const ref = process.env.TARGET_REF;
            const prefixes = [
              `${process.env.CACHE_NAMESPACE}-llama-cuda-slim-`,
              `${process.env.CACHE_NAMESPACE}-llama-cuda-fat-`,
              `${process.env.CACHE_NAMESPACE}-llama-rocm-slim-`,
              `${process.env.CACHE_NAMESPACE}-llama-rocm-fat-`,
            ];

            if (!Number.isFinite(retention) || retention < 1) {
              core.setFailed(
                `LLAMA_GPU_CACHE_RETENTION must be a positive integer, got: "${process.env.RETENTION}"`
              );
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const allCaches = [];
            for (let page = 1; page <= 10; page++) {
              const { data } = await github.request(
                'GET /repos/{owner}/{repo}/actions/caches',
                {
                  owner,
                  repo,
                  ref,
                  per_page: 100,
                  page,
                  sort: 'created_at',
                  direction: 'desc',
                }
              );
              const pageCaches = data.actions_caches || [];
              allCaches.push(...pageCaches);
              if (pageCaches.length < 100) break;
            }

            const failures = [];
            const rows = [[
              { data: 'Prefix', header: true },
              { data: 'Before', header: true },
              { data: 'Deleted', header: true },
              { data: 'Failed', header: true },
              { data: 'Freed', header: true },
            ]];

            for (const prefix of prefixes) {
              const matching = allCaches.filter((c) => c.key.startsWith(prefix));
              core.notice(`Found ${matching.length} ${prefix}* cache(s) on ${ref}, retention = ${retention}`);

              const toDelete = matching.slice(retention);
              let deleted = 0;
              let freedBytes = 0;

              for (const cache of toDelete) {
                const sizeMiB = ((cache.size_in_bytes || 0) / (1024 * 1024)).toFixed(1);
                core.info(`Deleting cache ${cache.id} — ${cache.key} (${sizeMiB} MiB, created ${cache.created_at})`);
                try {
                  await github.request(
                    'DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}',
                    { owner, repo, cache_id: cache.id }
                  );
                  deleted += 1;
                  freedBytes += cache.size_in_bytes || 0;
                } catch (err) {
                  failures.push({ id: cache.id, key: cache.key, error: err.message });
                  core.warning(`Failed to delete cache ${cache.id}: ${err.message}`);
                }
              }

              rows.push([
                prefix,
                String(matching.length),
                String(deleted),
                String(toDelete.length - deleted),
                `${(freedBytes / (1024 * 1024)).toFixed(1)} MiB`,
              ]);
            }

            await core.summary
              .addHeading('GPU cache prune summary', 2)
              .addTable(rows)
              .write();

            if (failures.length > 0) {
              core.setFailed(`Failed to delete ${failures.length} cache(s); see warnings above`);
            }
