name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CACHE_NAMESPACE: mesh-llm
  # Tiny model for integration tests (~138MB Q8_0, has chat template)
  MODEL_URL: https://huggingface.co/unsloth/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q8_0.gguf
  MODEL_FILE: SmolLM2-135M-Instruct-Q8_0.gguf
  # Small MoE model for MoE split tests (~598MB Q2_K, qwen35moe architecture)
  MOE_MODEL_URL: https://huggingface.co/Flexan/kshitijthakkar-qwen3.5-moe-0.87B-d0.8B-GGUF/resolve/main/qwen3.5-moe-0.87B-d0.8B.Q2_K.gguf
  MOE_MODEL_FILE: qwen3.5-moe-0.87B-d0.8B-Q2_K.gguf
  SCCACHE_GHA_ENABLED: "true"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'mesh-llm/src/**'
              - 'mesh-llm/build.rs'
              - 'mesh-llm/plugin/**'
              - 'mesh-llm/tests/**'
              - 'mesh-llm/proto/**'
              - 'mesh-llm/Cargo.toml'
              - 'mesh-llm/Cargo.lock'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Justfile'
              - 'scripts/**'
              - '.github/cache-version.txt'
              - '.github/workflows/**'
            ui:
              - 'mesh-llm/ui/**'

  linux:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ── UI ──
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            .github/cache-version.txt
            ci/requirements-ci-python.txt

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      - name: Install Python SDKs
        run: python -m pip install --upgrade pip -r ci/requirements-ci-python.txt

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Unit tests
        run: cargo test --release

      - name: Build mesh-llm
        run: cargo build --release -p mesh-llm --bin mesh-llm

      - name: Check formatting
        working-directory: mesh-llm
        run: cargo fmt -- --check || true

      - name: Clippy
        working-directory: mesh-llm
        run: cargo clippy -- -D warnings || true

      # ── llama.cpp (CPU-only for CI) ──
      - name: Clone llama.cpp fork
        run: git clone -b upstream-latest --depth 1 https://github.com/michaelneale/llama.cpp.git llama.cpp

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(nproc) --target rpc-server llama-server llama-moe-split

      # ── Download model ──
      - name: Cache model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      # ── Integration smoke test ──
      - name: Smoke test (real inference)
        run: |
          scripts/ci-smoke-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: OpenAI Python compat smoke
        run: |
          scripts/ci-compat-smoke.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: Split-mode test (host/worker routing)
        run: |
          scripts/ci-split-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      # ── MoE split test ──
      - name: Cache MoE model
        id: cache-moe-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MOE_MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MOE_MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download MoE model
        if: steps.cache-moe-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MOE_MODEL_URL" -o ~/.models/$MOE_MODEL_FILE
          ls -lh ~/.models/$MOE_MODEL_FILE

      - name: MoE split test (expert sharding)
        run: |
          scripts/ci-moe-split-test.sh \
            llama.cpp/build/bin \
            ~/.models/$MOE_MODEL_FILE

      - name: MoE mesh test (expert sharding end-to-end)
        run: |
          scripts/ci-moe-mesh-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MOE_MODEL_FILE

      - name: CLI smoke test
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Client-auto boot test
        run: scripts/ci-client-auto-test.sh target/release/mesh-llm

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  macos:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ui == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      # ── UI ──
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        run: npm ci && npm run build

      # ── Rust ──
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mesh-llm
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Unit tests
        run: cargo test --release

      - name: Build mesh-llm
        run: cargo build --release -p mesh-llm --bin mesh-llm

      # ── llama.cpp (Metal + RPC) ──
      - name: Clone llama.cpp fork
        run: git clone -b upstream-latest --depth 1 https://github.com/michaelneale/llama.cpp.git llama.cpp

      - name: Build llama.cpp (CPU + RPC)
        run: |
          CACHE_FLAGS=()
          if command -v sccache >/dev/null 2>&1; then
            CACHE_FLAGS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=sccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
            )
          fi
          cmake -B llama.cpp/build -S llama.cpp \
            -DGGML_METAL=OFF \
            -DGGML_RPC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_OPENSSL=OFF \
            "${CACHE_FLAGS[@]}"
          cmake --build llama.cpp/build --config Release -j$(sysctl -n hw.ncpu) --target rpc-server llama-server llama-moe-split

      # ── Download model ──
      - name: Cache model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MODEL_URL" -o ~/.models/$MODEL_FILE
          ls -lh ~/.models/$MODEL_FILE

      # ── Integration smoke test ──
      - name: Smoke test (real inference)
        run: |
          scripts/ci-smoke-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      - name: Split-mode test (host/worker routing)
        run: |
          scripts/ci-split-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MODEL_FILE

      # ── MoE split test ──
      - name: Cache MoE model
        id: cache-moe-model
        uses: actions/cache@v5
        with:
          path: ~/.models/${{ env.MOE_MODEL_FILE }}
          key: ${{ env.CACHE_NAMESPACE }}-${{ runner.os }}-model-${{ env.MOE_MODEL_FILE }}-${{ hashFiles('.github/cache-version.txt', '.github/workflows/ci.yml') }}

      - name: Download MoE model
        if: steps.cache-moe-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.models
          curl -fSL "$MOE_MODEL_URL" -o ~/.models/$MOE_MODEL_FILE
          ls -lh ~/.models/$MOE_MODEL_FILE

      - name: MoE split test (expert sharding)
        run: |
          scripts/ci-moe-split-test.sh \
            llama.cpp/build/bin \
            ~/.models/$MOE_MODEL_FILE

      - name: MoE mesh test (expert sharding end-to-end)
        run: |
          scripts/ci-moe-mesh-test.sh \
            target/release/mesh-llm \
            llama.cpp/build/bin \
            ~/.models/$MOE_MODEL_FILE

      - name: CLI smoke test
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Client-auto boot test
        run: scripts/ci-client-auto-test.sh target/release/mesh-llm

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_cuda:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
    name: Linux CUDA
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build Linux CUDA backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-cuda

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_rocm:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
    name: Linux ROCm
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.0-complete

    steps:
      - name: Install base packages
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            python3
          rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build Linux ROCm backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-amd

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  linux_vulkan:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}
    name: Linux Vulkan
    runs-on: ubuntu-latest

    steps:
      - name: Install Vulkan build packages
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ca-certificates \
            curl \
            git \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            libvulkan-dev \
            glslc \
            python3
          sudo rm -rf /var/lib/apt/lists/*

      - uses: actions/checkout@v5

      - uses: taiki-e/install-action@just

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            .github/cache-version.txt
            mesh-llm/ui/package-lock.json

      - name: Build UI
        working-directory: mesh-llm/ui
        shell: bash
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: ${{ env.CACHE_NAMESPACE }}-rust-${{ hashFiles('.github/cache-version.txt') }}

      - name: Build Linux Vulkan backend
        shell: bash
        run: |
          just --shell bash --shell-arg -lc release-build-vulkan

      - name: CLI smoke test
        shell: bash
        run: |
          target/release/mesh-llm --version
          target/release/mesh-llm --help | head -5

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  # Windows CI builds disabled for now. Keep release.yml and ci.yml aligned so
  # Windows stays an explicit opt-in until the workflow is intentionally restored.
